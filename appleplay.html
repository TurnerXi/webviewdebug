<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f5f7">
    <title>Apple Pay 绑卡检测</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: rgba(0, 0, 0, 0.08);
            --success: #34c759;
            --success-bg: rgba(52, 199, 89, 0.12);
            --warning: #ff9500;
            --warning-bg: rgba(255, 149, 0, 0.12);
            --error: #ff3b30;
            --error-bg: rgba(255, 59, 48, 0.12);
            --info: #007aff;
            --info-bg: rgba(0, 122, 255, 0.1);
            --radius: 16px;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 480px;
            margin: 0 auto;
            padding: max(24px, env(safe-area-inset-top)) 20px max(32px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 0 28px;
        }

        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #1d1d1f 0%, #3a3a3c 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Status card */
        .status-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            transition: all 0.35s ease;
        }

        .status-card.idle .status-icon {
            background: var(--bg);
            color: var(--text-secondary);
        }

        .status-card.success {
            border-color: rgba(52, 199, 89, 0.3);
            background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
        }

        .status-card.success .status-icon {
            background: var(--success-bg);
            color: var(--success);
        }

        .status-card.warning {
            border-color: rgba(255, 149, 0, 0.3);
            background: linear-gradient(135deg, #fff 0%, #fffbf0 100%);
        }

        .status-card.warning .status-icon {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .status-card.error {
            border-color: rgba(255, 59, 48, 0.3);
            background: linear-gradient(135deg, #fff 0%, #fff5f5 100%);
        }

        .status-card.error .status-icon {
            background: var(--error-bg);
            color: var(--error);
        }

        .status-card.loading .status-icon {
            background: var(--info-bg);
            color: var(--info);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.35s ease;
        }

        .status-icon svg {
            width: 22px;
            height: 22px;
        }

        .status-text h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .status-text p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Console */
        .console-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 20px;
        }

        .console-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        #console {
            flex: 1;
            min-height: 180px;
            max-height: 320px;
            overflow-y: auto;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 12px;
            scroll-behavior: smooth;
        }

        #console::-webkit-scrollbar {
            width: 4px;
        }

        #console::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 4px;
        }

        .log-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 13px;
            gap: 8px;
            padding: 24px;
        }

        .log-empty svg {
            width: 32px;
            height: 32px;
            opacity: 0.35;
        }

        .log-entry {
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.45;
            animation: fadeIn 0.3s ease;
        }

        .log-entry + .log-entry {
            margin-top: 4px;
        }

        .log-entry.info {
            background: var(--info-bg);
        }

        .log-entry.success {
            background: var(--success-bg);
        }

        .log-entry.warning {
            background: var(--warning-bg);
        }

        .log-entry.error {
            background: var(--error-bg);
        }

        .log-entry.divider {
            background: transparent;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 12px 10px 6px;
        }

        .log-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .log-entry.info .log-dot { background: var(--info); }
        .log-entry.success .log-dot { background: var(--success); }
        .log-entry.warning .log-dot { background: var(--warning); }
        .log-entry.error .log-dot { background: var(--error); }

        .log-time {
            color: var(--text-secondary);
            font-size: 11px;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .log-msg {
            flex: 1;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            animation: spin 0.8s linear infinite;
        }

        /* Button */
        .btn-wrap {
            margin-top: auto;
            padding-top: 8px;
        }

        #apple-pay-button-type-check-out {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: #000;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: -0.01em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #apple-pay-button-type-check-out:hover {
            background: #1d1d1f;
        }

        #apple-pay-button-type-check-out:active {
            transform: scale(0.98);
        }

        #apple-pay-button-type-check-out:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        #apple-pay-button-type-check-out .apple-mark {
            font-size: 20px;
            line-height: 1;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 14px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
            </div>
            <h1>Apple Pay 绑卡检测</h1>
            <p>检测当前设备 Wallet 钱包中是否已绑定支付卡</p>
        </header>

        <div class="status-card idle" id="status-card">
            <div class="status-row">
                <div class="status-icon" id="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                </div>
                <div class="status-text">
                    <h2 id="status-title">等待检测</h2>
                    <p id="status-desc">点击下方按钮开始检测</p>
                </div>
            </div>
        </div>

        <section class="console-section">
            <div class="console-label">检测日志</div>
            <div id="console">
                <div class="log-empty" id="log-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/>
                        <line x1="9" y1="12" x2="15" y2="12"/>
                        <line x1="9" y1="16" x2="13" y2="16"/>
                    </svg>
                    <span>暂无日志，点击按钮开始检测</span>
                </div>
            </div>
        </section>

        <div class="btn-wrap">
            <button id="apple-pay-button-type-check-out">
                <span class="apple-mark"></span>
                <span>开始检测</span>
            </button>
            <p class="footer-note">需在 Safari 浏览器中使用 · 调用 Apple Pay JS API</p>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById("console");
        const logEmptyEl = document.getElementById("log-empty");
        const statusCard = document.getElementById("status-card");
        const statusIcon = document.getElementById("status-icon");
        const statusTitle = document.getElementById("status-title");
        const statusDesc = document.getElementById("status-desc");
        const btn = document.getElementById("apple-pay-button-type-check-out");

        const icons = {
            idle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,
            loading: `<svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
            success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
            warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
            error: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
        };

        function formatTime() {
            const d = new Date();
            return [d.getHours(), d.getMinutes(), d.getSeconds()]
                .map(n => String(n).padStart(2, "0"))
                .join(":");
        }

        function log(type, ...messages) {
            if (logEmptyEl) logEmptyEl.remove();

            const entry = document.createElement("div");
            entry.className = `log-entry ${type}`;

            const msg = messages.join(" ");
            entry.innerHTML = type === "divider"
                ? msg
                : `<span class="log-time">${formatTime()}</span><span class="log-dot"></span><span class="log-msg">${msg}</span>`;

            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function setStatus(state, title, desc) {
            statusCard.className = `status-card ${state}`;
            statusIcon.innerHTML = icons[state] || icons.idle;
            statusTitle.textContent = title;
            statusDesc.textContent = desc;
        }

        const applePayJSLoadedPromise = new Promise((resolve, reject) => {
            const element = document.createElement("script");
            element.addEventListener("load", resolve, { once: true });
            element.addEventListener("error", reject, { once: true });
            element.src = "https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js";
            element.crossOrigin = "anonymous";
            document.head.appendChild(element);
        });

        btn.addEventListener("click", () => {
            btn.disabled = true;
            setStatus("loading", "检测中...", "正在调用 Apple Pay API");
            log("info", "开始加载 Apple Pay SDK...");

            applePayJSLoadedPromise
                .then(() => {
                    log("info", "SDK 加载成功，正在查询绑卡状态...");
                    return ApplePaySession.applePayCapabilities("merchant.com.apple.applepaydemo");
                })
                .then(response => {
                    log("divider", "— 检测结果 —");
                    log("info", "返回状态:", response.paymentCredentialStatus);

                    if (response.paymentCredentialStatus === "paymentCredentialsAvailable") {
                        setStatus("success", "已绑卡", "Wallet 钱包中检测到可用支付卡");
                        log("success", "检测成功：Wallet 钱包里已有支付卡");
                    } else {
                        setStatus("warning", "未绑卡", "Wallet 钱包中未检测到支付卡");
                        log("warning", "检测成功：Wallet 钱包里暂无支付卡");
                    }
                })
                .catch(err => {
                    setStatus("error", "检测失败", String(err.message || err));
                    log("error", "检测失败:", err.message || err);
                })
                .finally(() => {
                    btn.disabled = false;
                });
        });
    </script>
</body>

</html>
